<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .name { font-family: Georgia, 'Times New Roman', serif; }

      /* Fade in layers */
      .line-1 { animation: fadeUp 0.6s ease 0.1s both; }
      .line-2 { animation: fadeUp 0.6s ease 0.35s both; }
      .line-3 { animation: fadeUp 0.6s ease 0.6s both; }
      .line-4 { animation: fadeUp 0.6s ease 0.85s both; }
      .divider { animation: expandX 0.8s ease 0.2s both; }
      .accent-dot { animation: pulse 2.4s ease-in-out 1.2s infinite; }
      .cursor { animation: blink 1s step-end infinite; }
      .tag-1 { animation: fadeUp 0.5s ease 1.0s both; }
      .tag-2 { animation: fadeUp 0.5s ease 1.15s both; }
      .tag-3 { animation: fadeUp 0.5s ease 1.30s both; }
      .tag-4 { animation: fadeUp 0.5s ease 1.45s both; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandX {
        from { transform: scaleX(0); transform-origin: left; }
        to   { transform: scaleX(1); transform-origin: left; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; r: 4; }
        50%       { opacity: 0.4; r: 5; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>

    <!-- subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- terracota glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="#0B1120"/>
  <rect width="860" height="200" fill="url(#grid)" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="200" fill="#D97757" class="divider"/>

  <!-- Accent dot -->
  <circle cx="3" cy="100" r="4" fill="#D97757" filter="url(#glow)" class="accent-dot"/>

  <!-- Eyebrow label -->
  <text x="28" y="42" class="mono" font-size="10" fill="#525252" letter-spacing="3" text-anchor="start" class="line-1">— SENIOR MULTI-DOMAIN ENGINEER · COSTA RICA</text>

  <!-- Name -->
  <text x="28" y="90" class="name" font-size="42" font-weight="700" fill="#F1F5F9" letter-spacing="-1" class="line-2">Josue Cascante</text>

  <!-- Cursor after name -->
  <rect x="298" y="60" width="3" height="38" fill="#D97757" class="cursor"/>

  <!-- Manifesto line -->
  <text x="28" y="122" class="mono" font-size="12" fill="#A8A29E" class="line-3">I architect Odoo systems that survive the audit,</text>
  <text x="28" y="140" class="mono" font-size="12" fill="#A8A29E" class="line-4">the migration, and the third change of accountant.</text>

  <!-- Horizontal divider -->
  <line x1="28" y1="158" x2="832" y2="158" stroke="#1e293b" stroke-width="1" class="divider"/>

  <!-- Tag pills bottom row -->
  <!-- Tag 1: Odoo -->
  <g class="tag-1">
    <rect x="28" y="168" width="86" height="20" rx="3" fill="#0F172A" stroke="#D97757" stroke-width="1"/>
    <text x="71" y="182" class="mono" font-size="9.5" fill="#D97757" text-anchor="middle">Odoo V10→V19</text>
  </g>
  <!-- Tag 2: DevOps -->
  <g class="tag-2">
    <rect x="122" y="168" width="68" height="20" rx="3" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="156" y="182" class="mono" font-size="9.5" fill="#A8A29E" text-anchor="middle">DevOps · K8s</text>
  </g>
  <!-- Tag 3: AI -->
  <g class="tag-3">
    <rect x="198" y="168" width="82" height="20" rx="3" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="239" y="182" class="mono" font-size="9.5" fill="#A8A29E" text-anchor="middle">AI · 10+ yrs pre-LLM</text>
  </g>
  <!-- Tag 4: Industrial -->
  <g class="tag-4">
    <rect x="288" y="168" width="112" height="20" rx="3" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="344" y="182" class="mono" font-size="9.5" fill="#A8A29E" text-anchor="middle">Industrial Automation · IoT</text>
  </g>

  <!-- Right side: company block -->
  <g class="line-2">
    <text x="832" y="82" class="mono" font-size="9" fill="#525252" text-anchor="end" letter-spacing="2">FOUNDER &amp; CEO</text>
    <text x="832" y="98" class="mono" font-size="16" font-weight="700" fill="#D97757" text-anchor="end" filter="url(#glow)">Tensor Analytics</text>
    <text x="832" y="114" class="mono" font-size="9" fill="#525252" text-anchor="end" letter-spacing="1">app.tensor-analytics.pro</text>
  </g>
</svg>
